apiVersion: apps/v1
kind: Deployment
metadata:
  name: photojugaad-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: photojugaad-frontend
  template:
    metadata:
      labels:
        app: photojugaad-frontend
    spec:
      containers:
        - name: frontend
          image: photojugaad-frontend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: photojugaad-frontend-secret
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"


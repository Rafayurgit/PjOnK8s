apiVersion: apps/v1
kind: Deployment
metadata:
  name: photojugaad-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: photojugaad-backend
  template:
    metadata:
      labels:
        app: photojugaad-backend
    spec:
      containers:
        - name: backend
          image: photojugaad-backend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: photojugaad-backend-secret
            - configMapRef:
                name: photojugaad-backend-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets correctly
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # Optional: favicon, etc.
    location /favicon.ico {
        try_files $uri =404;
    }

    # Main app (React routing)
    location / {
        try_files $uri /index.html;
    }
}